version: "3.8"
services:
  mongodb:
    image: mongo
    container_name: mongo_db
    volumes:
      - mongo-data:/data/db
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    depends_on:
      - mongo_db
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"
  nginx:
    build: ./nginx
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
volumes:
  mongo-data: